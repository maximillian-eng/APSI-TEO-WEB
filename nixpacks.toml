[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_18", "npm-9_x"]

[phases.install]
cmds = ["composer install --ignore-platform-reqs", "npm ci"]

[phases.build]
cmds = ["npm run build"]

[phases.start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
